<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celticket - Creador de Escenario</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #111827;
            --panel-soft: #1f2937;
            --text: #e5e7eb;
            --muted: #94a3b8;
            --accent: #22c55e;
            --danger: #b91c1c;
            --seat: #334155;
            --section: #1e293b;
            --section-border: #475569;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 16px;
            padding: 16px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 14px;
        }

        h1 {
            margin: 0 0 10px 0;
            color: var(--accent);
            font-size: 20px;
        }

        .subtitle {
            margin: 0 0 14px 0;
            color: var(--muted);
            font-size: 13px;
        }

        .form {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }

        .form input {
            background: #020617;
            color: var(--text);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 8px;
            width: 100%;
        }

        .form .full {
            grid-column: 1 / -1;
        }

        button {
            border: none;
            border-radius: 8px;
            padding: 9px 10px;
            cursor: pointer;
            color: #fff;
            background: #2563eb;
            font-weight: 600;
        }

        button:hover:not(:disabled) {
            filter: brightness(1.1);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-green { background: #16a34a; }
        .btn-gray { background: #475569; }
        .btn-red { background: var(--danger); }

        .section-list {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 210px;
            overflow-y: auto;
        }

        .section-item {
            background: var(--panel-soft);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .json-box {
            margin-top: 10px;
            width: 100%;
            min-height: 170px;
            resize: vertical;
            background: #020617;
            color: #dbeafe;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px;
            font-family: Consolas, monospace;
        }

        .right {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .stage-wrap {
            background: var(--panel);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stage-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--muted);
            font-size: 13px;
        }

        .stage {
            position: relative;
            width: 100%;
            min-height: 620px;
            border-radius: 10px;
            border: 1px dashed #64748b;
            background:
                radial-gradient(circle at 1px 1px, rgba(148, 163, 184, 0.22) 1px, transparent 0);
            background-size: 22px 22px;
            overflow: hidden;
        }

        .section-box {
            position: absolute;
            border: 1px solid var(--section-border);
            border-radius: 8px;
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.25);
            user-select: none;
        }

        .section-box.dragging {
            opacity: 0.85;
            cursor: grabbing;
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.35);
        }

        .platform-box {
            position: absolute;
            border-radius: 10px;
            border: 1px solid #f59e0b;
            background: linear-gradient(180deg, #f59e0b 0%, #b45309 100%);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.35);
            user-select: none;
            color: #111827;
            font-weight: 800;
            text-align: center;
        }

        .platform-box.selected {
            outline: 2px solid #fde68a;
            outline-offset: 2px;
        }

        .platform-box.dragging {
            opacity: 0.85;
            cursor: grabbing;
        }

        .platform-title {
            cursor: grab;
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 1px;
            font-size: 13px;
        }

        .platform-resize-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            right: -6px;
            bottom: -6px;
            border-radius: 50%;
            background: #f8fafc;
            border: 1px solid #0f172a;
            cursor: nwse-resize;
        }

        .platform-rotate-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            left: 50%;
            top: -20px;
            transform: translateX(-50%);
            border-radius: 50%;
            background: #bfdbfe;
            border: 1px solid #1e3a8a;
            cursor: alias;
        }

        .section-title {
            cursor: grab;
            background: rgba(71, 85, 105, 0.4);
            padding: 5px 8px;
            border-bottom: 1px solid #334155;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
        }

        .mini-grid {
            padding: 8px;
            display: grid;
            gap: 4px;
        }

        .mini-seat {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            background: var(--seat);
        }

        .hint {
            color: var(--muted);
            font-size: 12px;
        }

        .origin-cross {
            position: absolute;
            left: 0;
            top: 0;
            width: 14px;
            height: 14px;
            z-index: 20;
            pointer-events: none;
        }

        .origin-cross::before,
        .origin-cross::after {
            content: '';
            position: absolute;
            background: #ef4444;
        }

        .origin-cross::before {
            left: 6px;
            top: 0;
            width: 2px;
            height: 14px;
        }

        .origin-cross::after {
            left: 0;
            top: 6px;
            width: 14px;
            height: 2px;
        }
    </style>
</head>
<body>
    <aside class="panel">
        <h1>Creador de Escenario</h1>
        <p class="subtitle">Editor visual de <code>layoutConfig</code> compatible con el mock.</p>

        <div class="form">
            <input id="sectionName" class="full" placeholder="Nombre sección (ej. VIP_A)">
            <input id="sectionRows" type="number" min="1" max="40" value="5" placeholder="Filas">
            <input id="sectionCols" type="number" min="1" max="40" value="10" placeholder="Columnas">
            <input id="sectionBasePrice" type="number" min="1000" step="100" value="20000" placeholder="Precio base (centavos)">
            <button id="btnAddSection" class="btn-green">Agregar</button>
            <input id="seatSizeInput" type="number" min="8" max="40" value="12" placeholder="Tamaño asiento">
            <input id="seatGapInput" type="number" min="0" max="20" value="4" placeholder="Gap asiento">
            <button id="btnApplySeatStyle" class="btn-gray" type="button">Aplicar Asientos</button>
            <input id="platformWidth" type="number" min="80" max="900" value="220" placeholder="Ancho tarima">
            <input id="platformHeight" type="number" min="30" max="220" value="60" placeholder="Alto tarima">
            <button id="btnUpdatePlatform" class="btn-gray" type="button">Actualizar Seleccionada</button>
            <button id="btnAddPlatform" class="btn-green full" type="button">Agregar Tarima</button>
            <button id="btnTogglePlatform" class="btn-gray" type="button">Mostrar/Ocultar Seleccionada</button>
            <button id="btnRemovePlatform" class="btn-red" type="button">Eliminar Seleccionada</button>
            <button id="btnAutoLayout" class="btn-gray full" type="button">Auto-organizar</button>
            <button id="btnClear" class="btn-red full" type="button">Limpiar todo</button>
        </div>

        <div id="sectionList" class="section-list"></div>

        <div style="display:flex; gap:8px; margin-top:10px;">
            <button id="btnExportJson" class="btn-green" type="button">Exportar JSON</button>
            <button id="btnImportJson" class="btn-gray" type="button">Importar JSON</button>
            <button id="btnCopyJson" type="button">Copiar</button>
        </div>
        <textarea id="jsonOutput" class="json-box" spellcheck="false"></textarea>
        <p class="hint">Puedes ajustar tamaño/gap de asientos y mover, redimensionar o rotar tarimas. El JSON exporta todo en <code>meta</code>.</p>
    </aside>

    <section class="right">
        <div class="stage-wrap">
            <div class="stage-header">
                <span>Escenario visual (arrastra secciones con el mouse)</span>
                <span id="statusText">0 secciones</span>
            </div>
            <div id="stage" class="stage"></div>
        </div>
    </section>

    <script>
        function newTarima(partial, idxHint) {
            return {
                id: partial?.id || ("t_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 6)),
                name: partial?.name || `Tarima ${idxHint || 1}`,
                enabled: partial?.enabled !== false,
                x: Number.isFinite(Number(partial?.x)) ? Number(partial.x) : (250 + (idxHint || 0) * 18),
                y: Number.isFinite(Number(partial?.y)) ? Number(partial.y) : 16,
                width: Number.isFinite(Number(partial?.width)) ? Math.max(80, Math.min(900, Number(partial.width))) : 220,
                height: Number.isFinite(Number(partial?.height)) ? Math.max(30, Math.min(220, Number(partial.height))) : 60,
                rotation: Number.isFinite(Number(partial?.rotation)) ? Number(partial.rotation) : 0
            };
        }

        const model = {
            sections: [],
            tarimas: [newTarima({}, 1)],
            selectedTarimaId: null,
            seatStyle: {
                seatSize: 12,
                seatGap: 4
            }
        };
        model.selectedTarimaId = model.tarimas[0].id;

        let dragState = null;

        function safeName(raw) {
            const compact = (raw || "").trim().replace(/\s+/g, "_");
            return compact.replace(/[^a-zA-Z0-9_-]/g, "").substring(0, 25);
        }

        function sectionPixelSize(section) {
            const seatSize = model.seatStyle.seatSize;
            const seatGap = model.seatStyle.seatGap;
            return {
                w: section.cols * seatSize + (section.cols - 1) * seatGap + 16,
                h: section.rows * seatSize + (section.rows - 1) * seatGap + 16 + 28
            };
        }

        function normalizeAngle(deg) {
            let value = deg % 360;
            if (value < 0) value += 360;
            return value;
        }

        function getSelectedTarima() {
            return model.tarimas.find(t => t.id === model.selectedTarimaId) || null;
        }

        function clampSection(section) {
            const stage = document.getElementById("stage");
            const size = sectionPixelSize(section);
            const maxX = Math.max(0, stage.clientWidth - size.w);
            const maxY = Math.max(0, stage.clientHeight - size.h);
            section.x = Math.max(0, Math.min(section.x, maxX));
            section.y = Math.max(0, Math.min(section.y, maxY));
        }

        function clampTarima(tarima) {
            const stage = document.getElementById("stage");
            const maxX = Math.max(0, stage.clientWidth - tarima.width);
            const maxY = Math.max(0, stage.clientHeight - tarima.height);
            tarima.x = Math.max(0, Math.min(tarima.x, maxX));
            tarima.y = Math.max(0, Math.min(tarima.y, maxY));
        }

        function getLayoutConfig() {
            const stage = document.getElementById("stage");
            const tarimas = model.tarimas.map(t => ({
                name: t.name,
                enabled: t.enabled,
                x: t.x,
                y: t.y,
                width: t.width,
                height: t.height,
                rotation: t.rotation
            }));

            return {
                meta: {
                    source: "layout_builder_v1",
                    recommendedScaleForSeatMock: 2.85,
                    seatSize: model.seatStyle.seatSize,
                    seatGap: model.seatStyle.seatGap,
                    canvasWidth: stage ? stage.clientWidth : null,
                    canvasHeight: stage ? stage.clientHeight : null
                },
                tarimas,
                // compatibilidad hacia atrás: frontend que solo entienda una tarima.
                tarima: tarimas[0] || null,
                sections: model.sections.map(s => ({
                    name: s.name,
                    rows: s.rows,
                    cols: s.cols,
                    basePriceCents: s.basePriceCents,
                    x: s.x,
                    y: s.y
                }))
            };
        }

        function refreshJsonOutput() {
            document.getElementById("jsonOutput").value = JSON.stringify(getLayoutConfig(), null, 2);
        }

        function syncPlatformInputs() {
            const selected = getSelectedTarima();
            const widthInput = document.getElementById("platformWidth");
            const heightInput = document.getElementById("platformHeight");
            if (!selected) {
                widthInput.value = 220;
                heightInput.value = 60;
                return;
            }
            widthInput.value = Math.round(selected.width);
            heightInput.value = Math.round(selected.height);
        }

        function syncSeatStyleInputs() {
            document.getElementById("seatSizeInput").value = model.seatStyle.seatSize;
            document.getElementById("seatGapInput").value = model.seatStyle.seatGap;
        }

        function updateStatus() {
            const sectionsTotal = model.sections.length;
            const tarimasTotal = model.tarimas.length;
            const selected = getSelectedTarima();
            const selectedInfo = selected ? `seleccionada: ${selected.name}` : "sin selección";
            document.getElementById("statusText").innerText =
                `${sectionsTotal} ${sectionsTotal === 1 ? "sección" : "secciones"} | ${tarimasTotal} ${tarimasTotal === 1 ? "tarima" : "tarimas"} | ${selectedInfo}`;
        }

        function renderSectionList() {
            const list = document.getElementById("sectionList");
            list.innerHTML = "";

            if (model.sections.length === 0) {
                list.innerHTML = '<div class="section-item"><span style="color:#94a3b8">Sin secciones todavía.</span></div>';
            } else {
                model.sections.forEach((s, index) => {
                    const item = document.createElement("div");
                    item.className = "section-item";
                    item.innerHTML = `
                        <span><strong>${s.name}</strong> - ${s.rows}x${s.cols} - $${Math.round(s.basePriceCents / 100).toLocaleString('es-CO')} - pos(${Math.round(s.x)}, ${Math.round(s.y)})</span>
                        <button class="btn-red" type="button" onclick="removeSection(${index})">Eliminar</button>
                    `;
                    list.appendChild(item);
                });
            }

            model.tarimas.forEach((t, index) => {
                const tarimaItem = document.createElement("div");
                tarimaItem.className = "section-item";
                tarimaItem.style.borderColor = t.id === model.selectedTarimaId ? "#f59e0b" : "#334155";
                tarimaItem.innerHTML = `
                    <span><strong>${t.name}</strong> - ${Math.round(t.width)}x${Math.round(t.height)} - rot(${Math.round(t.rotation)}deg)</span>
                    <button class="btn-gray" type="button" onclick="selectTarimaByIndex(${index})">Seleccionar</button>
                `;
                list.appendChild(tarimaItem);
            });

            refreshJsonOutput();
            updateStatus();
            syncPlatformInputs();
            syncSeatStyleInputs();
        }

        function renderStage() {
            const stage = document.getElementById("stage");
            stage.innerHTML = "";

            const originMarker = document.createElement("div");
            originMarker.className = "origin-cross";
            originMarker.title = "(0,0)";
            stage.appendChild(originMarker);

            model.tarimas.forEach((tarima) => {
                clampTarima(tarima);
                if (!tarima.enabled) return;

                const platform = document.createElement("div");
                platform.className = "platform-box" + (tarima.id === model.selectedTarimaId ? " selected" : "");
                platform.dataset.id = tarima.id;
                platform.style.left = tarima.x + "px";
                platform.style.top = tarima.y + "px";
                platform.style.width = tarima.width + "px";
                platform.style.height = tarima.height + "px";
                platform.style.transform = `rotate(${tarima.rotation}deg)`;
                platform.style.transformOrigin = "center center";
                platform.addEventListener("mousedown", () => {
                    model.selectedTarimaId = tarima.id;
                    renderSectionList();
                });

                const title = document.createElement("div");
                title.className = "platform-title";
                title.innerText = `${tarima.name.toUpperCase()} (${Math.round(tarima.rotation)}deg)`;
                title.addEventListener("mousedown", (e) => startInteraction(e, "tarima-move", tarima.id));
                platform.appendChild(title);

                const rotateHandle = document.createElement("div");
                rotateHandle.className = "platform-rotate-handle";
                rotateHandle.title = "Rotar";
                rotateHandle.addEventListener("mousedown", (e) => startInteraction(e, "tarima-rotate", tarima.id));
                platform.appendChild(rotateHandle);

                const resizeHandle = document.createElement("div");
                resizeHandle.className = "platform-resize-handle";
                resizeHandle.title = "Redimensionar";
                resizeHandle.addEventListener("mousedown", (e) => startInteraction(e, "tarima-resize", tarima.id));
                platform.appendChild(resizeHandle);

                stage.appendChild(platform);
            });

            model.sections.forEach(section => {
                clampSection(section);

                const box = document.createElement("div");
                box.className = "section-box";
                box.dataset.id = section.id;
                box.style.left = section.x + "px";
                box.style.top = section.y + "px";

                const size = sectionPixelSize(section);
                box.style.width = size.w + "px";

                const title = document.createElement("div");
                title.className = "section-title";
                title.innerHTML = `<span>${section.name}</span><span>${section.rows}x${section.cols}</span>`;
                title.addEventListener("mousedown", (e) => startInteraction(e, "section-move", section.id));
                box.appendChild(title);

                const miniGrid = document.createElement("div");
                miniGrid.className = "mini-grid";
                miniGrid.style.gridTemplateColumns = `repeat(${section.cols}, ${model.seatStyle.seatSize}px)`;
                miniGrid.style.gap = `${model.seatStyle.seatGap}px`;
                for (let i = 0; i < section.rows * section.cols; i++) {
                    const seat = document.createElement("div");
                    seat.className = "mini-seat";
                    seat.style.width = `${model.seatStyle.seatSize}px`;
                    seat.style.height = `${model.seatStyle.seatSize}px`;
                    miniGrid.appendChild(seat);
                }
                box.appendChild(miniGrid);

                stage.appendChild(box);
            });

            renderSectionList();
        }

        function addSection() {
            const name = safeName(document.getElementById("sectionName").value);
            const rows = parseInt(document.getElementById("sectionRows").value, 10);
            const cols = parseInt(document.getElementById("sectionCols").value, 10);
            const basePriceCents = parseInt(document.getElementById("sectionBasePrice").value, 10);

            if (!name) {
                alert("Nombre inválido. Usa letras, números, _ o -.");
                return;
            }
            if (!Number.isInteger(rows) || !Number.isInteger(cols) || rows < 1 || cols < 1 || rows > 40 || cols > 40) {
                alert("Filas y columnas deben estar entre 1 y 40.");
                return;
            }
            if (!Number.isInteger(basePriceCents) || basePriceCents < 1000) {
                alert("Precio base inválido. Usa centavos >= 1000.");
                return;
            }
            if (model.sections.some(s => s.name === name)) {
                alert("Ya existe una sección con ese nombre.");
                return;
            }

            model.sections.push({
                id: "s_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 6),
                name,
                rows,
                cols,
                basePriceCents,
                x: 20 + model.sections.length * 20,
                y: 40 + model.sections.length * 20
            });

            document.getElementById("sectionName").value = "";
            renderStage();
        }

        function removeSection(index) {
            model.sections.splice(index, 1);
            renderStage();
        }

        function addPlatform() {
            const tarima = newTarima({}, model.tarimas.length + 1);
            tarima.x = 24 + model.tarimas.length * 20;
            tarima.y = 16 + model.tarimas.length * 20;
            model.tarimas.push(tarima);
            model.selectedTarimaId = tarima.id;
            renderStage();
        }

        function selectTarimaByIndex(index) {
            if (!model.tarimas[index]) return;
            model.selectedTarimaId = model.tarimas[index].id;
            renderStage();
        }
        window.selectTarimaByIndex = selectTarimaByIndex;
        window.removeSection = removeSection;

        function removeSelectedPlatform() {
            if (model.tarimas.length === 0) return;
            const idx = model.tarimas.findIndex(t => t.id === model.selectedTarimaId);
            if (idx < 0) return;
            model.tarimas.splice(idx, 1);
            model.selectedTarimaId = model.tarimas[0]?.id || null;
            renderStage();
        }

        function clearAll() {
            model.sections = [];
            model.tarimas = [newTarima({}, 1)];
            model.selectedTarimaId = model.tarimas[0].id;
            model.seatStyle.seatSize = 12;
            model.seatStyle.seatGap = 4;
            renderStage();
        }

        function autoLayout() {
            const stage = document.getElementById("stage");
            let cursorX = 12;
            let firstY = 12;
            model.tarimas.filter(t => t.enabled).forEach(t => {
                firstY = Math.max(firstY, t.y + t.height + 14);
            });
            let cursorY = firstY;
            let lineHeight = 0;
            const gap = 12;

            model.sections.forEach(section => {
                const size = sectionPixelSize(section);
                if (cursorX + size.w > stage.clientWidth - 8) {
                    cursorX = 12;
                    cursorY += lineHeight + gap;
                    lineHeight = 0;
                }
                section.x = cursorX;
                section.y = cursorY;
                cursorX += size.w + gap;
                lineHeight = Math.max(lineHeight, size.h);
            });

            renderStage();
        }

        function updateTarimaSize() {
            const selected = getSelectedTarima();
            if (!selected) {
                alert("No hay tarima seleccionada.");
                return;
            }
            const width = parseInt(document.getElementById("platformWidth").value, 10);
            const height = parseInt(document.getElementById("platformHeight").value, 10);

            if (!Number.isInteger(width) || !Number.isInteger(height) || width < 80 || width > 900 || height < 30 || height > 220) {
                alert("Tamaño de tarima inválido. Ancho: 80-900, Alto: 30-220.");
                return;
            }

            selected.width = width;
            selected.height = height;
            clampTarima(selected);
            renderStage();
        }

        function applySeatStyle() {
            const seatSize = parseInt(document.getElementById("seatSizeInput").value, 10);
            const seatGap = parseInt(document.getElementById("seatGapInput").value, 10);
            if (!Number.isInteger(seatSize) || seatSize < 8 || seatSize > 40) {
                alert("Tamaño de asiento inválido (8-40).");
                return;
            }
            if (!Number.isInteger(seatGap) || seatGap < 0 || seatGap > 20) {
                alert("Gap de asiento inválido (0-20).");
                return;
            }
            model.seatStyle.seatSize = seatSize;
            model.seatStyle.seatGap = seatGap;
            renderStage();
        }

        function toggleSelectedPlatform() {
            const selected = getSelectedTarima();
            if (!selected) {
                alert("No hay tarima seleccionada.");
                return;
            }
            selected.enabled = !selected.enabled;
            renderStage();
        }

        function exportJson() {
            refreshJsonOutput();
        }

        function copyJson() {
            const txt = document.getElementById("jsonOutput").value;
            navigator.clipboard.writeText(txt)
                .then(() => alert("JSON copiado."))
                .catch(() => {
                    const box = document.getElementById("jsonOutput");
                    box.select();
                    document.execCommand("copy");
                    alert("JSON copiado.");
                });
        }

        function importJson() {
            try {
                const txt = document.getElementById("jsonOutput").value;
                const parsed = JSON.parse(txt);
                if (!parsed.sections || !Array.isArray(parsed.sections)) {
                    throw new Error("Debe tener la propiedad sections[]");
                }

                const nextSections = parsed.sections.map((s, idx) => {
                    const name = safeName(s.name);
                    const rows = parseInt(s.rows, 10);
                    const cols = parseInt(s.cols, 10);
                    if (!name || !rows || !cols || rows < 1 || cols < 1) {
                        throw new Error("Sección inválida en índice " + idx);
                    }
                    return {
                        id: "import_s_" + idx + "_" + Date.now().toString(36),
                        name,
                        rows,
                        cols,
                        basePriceCents: Number.isFinite(Number(s.basePriceCents)) ? Math.max(1000, Math.round(Number(s.basePriceCents))) : 20000,
                        x: Number.isFinite(Number(s.x)) ? Number(s.x) : 20 + idx * 20,
                        y: Number.isFinite(Number(s.y)) ? Number(s.y) : 20 + idx * 20
                    };
                });

                let importedTarimas = [];
                if (Array.isArray(parsed.tarimas)) {
                    importedTarimas = parsed.tarimas.map((t, idx) => newTarima(t, idx + 1));
                } else if (parsed.tarima && typeof parsed.tarima === "object") {
                    importedTarimas = [newTarima(parsed.tarima, 1)];
                }
                if (importedTarimas.length === 0) {
                    importedTarimas = [newTarima({}, 1)];
                }

                model.sections = nextSections;
                model.tarimas = importedTarimas;
                model.selectedTarimaId = model.tarimas[0].id;
                model.seatStyle.seatSize = Number.isFinite(Number(parsed?.meta?.seatSize))
                    ? Math.max(8, Math.min(40, Number(parsed.meta.seatSize)))
                    : 12;
                model.seatStyle.seatGap = Number.isFinite(Number(parsed?.meta?.seatGap))
                    ? Math.max(0, Math.min(20, Number(parsed.meta.seatGap)))
                    : 4;
                renderStage();
            } catch (e) {
                alert("JSON inválido: " + e.message);
            }
        }

        function startInteraction(evt, mode, targetId) {
            evt.preventDefault();
            evt.stopPropagation();
            const stage = document.getElementById("stage");
            const stageRect = stage.getBoundingClientRect();

            if (mode.startsWith("tarima")) {
                model.selectedTarimaId = targetId;
                const t = model.tarimas.find(x => x.id === targetId);
                if (!t) return;
                dragState = {
                    mode,
                    targetId,
                    stageRect,
                    startMouseX: evt.clientX,
                    startMouseY: evt.clientY,
                    startX: t.x,
                    startY: t.y,
                    startWidth: t.width,
                    startHeight: t.height,
                    startRotation: t.rotation
                };
                const box = document.querySelector(`.platform-box[data-id="${targetId}"]`);
                if (box) box.classList.add("dragging");
            } else if (mode === "section-move") {
                const section = model.sections.find(s => s.id === targetId);
                if (!section) return;
                dragState = {
                    mode,
                    targetId,
                    stageRect,
                    startMouseX: evt.clientX,
                    startMouseY: evt.clientY,
                    startX: section.x,
                    startY: section.y
                };
                const box = document.querySelector(`.section-box[data-id="${targetId}"]`);
                if (box) box.classList.add("dragging");
            }

            document.addEventListener("mousemove", onDrag);
            document.addEventListener("mouseup", stopDrag);
        }

        function onDrag(evt) {
            if (!dragState) return;
            if (dragState.mode.startsWith("tarima")) {
                const tarima = model.tarimas.find(t => t.id === dragState.targetId);
                if (!tarima) return;

                if (dragState.mode === "tarima-move") {
                    tarima.x = dragState.startX + (evt.clientX - dragState.startMouseX);
                    tarima.y = dragState.startY + (evt.clientY - dragState.startMouseY);
                    clampTarima(tarima);
                } else if (dragState.mode === "tarima-resize") {
                    tarima.width = Math.max(80, Math.min(900, dragState.startWidth + (evt.clientX - dragState.startMouseX)));
                    tarima.height = Math.max(30, Math.min(220, dragState.startHeight + (evt.clientY - dragState.startMouseY)));
                    clampTarima(tarima);
                } else if (dragState.mode === "tarima-rotate") {
                    const centerX = tarima.x + tarima.width / 2;
                    const centerY = tarima.y + tarima.height / 2;
                    const dx = evt.clientX - (dragState.stageRect.left + centerX);
                    const dy = evt.clientY - (dragState.stageRect.top + centerY);
                    tarima.rotation = normalizeAngle((Math.atan2(dy, dx) * 180 / Math.PI) + 90);
                }
            } else if (dragState.mode === "section-move") {
                const section = model.sections.find(s => s.id === dragState.targetId);
                if (!section) return;
                section.x = dragState.startX + (evt.clientX - dragState.startMouseX);
                section.y = dragState.startY + (evt.clientY - dragState.startMouseY);
                clampSection(section);
            }

            renderStage();
        }

        function stopDrag() {
            document.removeEventListener("mousemove", onDrag);
            document.removeEventListener("mouseup", stopDrag);
            document.querySelectorAll(".section-box.dragging, .platform-box.dragging").forEach(el => el.classList.remove("dragging"));
            dragState = null;
            renderSectionList();
        }

        document.getElementById("btnAddSection").addEventListener("click", addSection);
        document.getElementById("btnApplySeatStyle").addEventListener("click", applySeatStyle);
        document.getElementById("btnUpdatePlatform").addEventListener("click", updateTarimaSize);
        document.getElementById("btnAddPlatform").addEventListener("click", addPlatform);
        document.getElementById("btnTogglePlatform").addEventListener("click", toggleSelectedPlatform);
        document.getElementById("btnRemovePlatform").addEventListener("click", removeSelectedPlatform);
        document.getElementById("btnAutoLayout").addEventListener("click", autoLayout);
        document.getElementById("btnClear").addEventListener("click", clearAll);
        document.getElementById("btnExportJson").addEventListener("click", exportJson);
        document.getElementById("btnImportJson").addEventListener("click", importJson);
        document.getElementById("btnCopyJson").addEventListener("click", copyJson);
        window.addEventListener("resize", renderStage);

        refreshJsonOutput();
        renderStage();
    </script>
</body>
</html>
