<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celticket Layout Studio</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #111827;
            --panel-soft: #1f2937;
            --text: #e5e7eb;
            --muted: #94a3b8;
            --accent: #22c55e;
            --danger: #b91c1c;
            --seat: #334155;
            --section: #1e293b;
            --section-border: #475569;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 16px;
            padding: 16px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        h1 {
            margin: 0;
            color: var(--accent);
            font-size: 20px;
        }

        .group-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .form input {
            background: #020617;
            color: var(--text);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 8px;
            width: 100%;
        }

        .form .full {
            grid-column: 1 / -1;
        }

        button {
            border: none;
            border-radius: 8px;
            padding: 9px 10px;
            cursor: pointer;
            color: #fff;
            background: #2563eb;
            font-weight: 600;
        }

        button:hover:not(:disabled) {
            filter: brightness(1.1);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-green { background: #16a34a; }
        .btn-gray { background: #475569; }
        .btn-red { background: var(--danger); }

        .section-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 260px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .section-item {
            background: var(--panel-soft);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 9px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 12px;
        }

        .section-item .title {
            font-weight: 700;
            color: #f8fafc;
            font-size: 13px;
            line-height: 1.2;
        }

        .section-item .meta {
            color: #94a3b8;
            font-size: 11px;
            line-height: 1.2;
        }

        .json-box {
            width: 100%;
            min-height: 130px;
            resize: vertical;
            background: #020617;
            color: #bfdbfe;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px;
            font-family: Consolas, monospace;
            font-size: 12px;
        }

        .right {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .stage-wrap {
            background: var(--panel);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stage-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--muted);
            font-size: 13px;
        }

        .stage {
            position: relative;
            width: 100%;
            min-height: 620px;
            border-radius: 10px;
            border: 1px dashed #475569;
            background:
                radial-gradient(circle at 1px 1px, rgba(148, 163, 184, 0.16) 1px, transparent 0);
            background-size: 22px 22px;
            overflow: hidden;
        }

        .section-box {
            position: absolute;
            border: 1px solid var(--section-border);
            border-radius: 8px;
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.25);
            user-select: none;
        }

        .section-box.dragging {
            opacity: 0.85;
            cursor: grabbing;
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.35);
        }

        .platform-box {
            position: absolute;
            border-radius: 10px;
            border: 1px solid #f59e0b;
            background: linear-gradient(180deg, #f59e0b 0%, #b45309 100%);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.35);
            user-select: none;
            color: #111827;
            font-weight: 800;
            text-align: center;
        }

        .platform-box.selected {
            outline: 2px solid #fde68a;
            outline-offset: 2px;
        }

        .platform-box.dragging {
            opacity: 0.85;
            cursor: grabbing;
        }

        .platform-title {
            cursor: grab;
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 1px;
            font-size: 13px;
        }

        .platform-resize-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            right: -6px;
            bottom: -6px;
            border-radius: 50%;
            background: #f8fafc;
            border: 1px solid #0f172a;
            cursor: nwse-resize;
        }

        .platform-rotate-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            left: 50%;
            top: -20px;
            transform: translateX(-50%);
            border-radius: 50%;
            background: #bfdbfe;
            border: 1px solid #1e3a8a;
            cursor: alias;
        }

        .section-title {
            cursor: grab;
            background: rgba(71, 85, 105, 0.4);
            padding: 5px 8px;
            border-bottom: 1px solid #334155;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
        }

        .mini-grid {
            padding: 8px;
            display: grid;
            gap: 4px;
        }

        .mini-seat {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            background: #4caf50;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-weight: 700;
            line-height: 1;
        }

        .hint {
            color: var(--muted);
            font-size: 12px;
        }

        .origin-cross {
            position: absolute;
            left: 0;
            top: 0;
            width: 14px;
            height: 14px;
            z-index: 20;
            pointer-events: none;
        }

        .origin-cross::before,
        .origin-cross::after {
            content: '';
            position: absolute;
            background: #ef4444;
        }

        .origin-cross::before {
            left: 6px;
            top: 0;
            width: 2px;
            height: 14px;
        }

        .origin-cross::after {
            left: 0;
            top: 6px;
            width: 14px;
            height: 2px;
        }

        .context-panel {
            position: fixed;
            z-index: 1200;
            width: 280px;
            background: #0b1220;
            border: 1px solid #334155;
            border-radius: 10px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.45);
            padding: 10px;
            display: none;
        }

        .context-panel h4 {
            margin: 0 0 8px 0;
            color: #dbeafe;
            font-size: 13px;
        }

        .context-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .context-form label {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 12px;
            color: #94a3b8;
        }

        .context-form input {
            background: #020617;
            color: #e5e7eb;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 6px;
        }

        .context-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
    </style>
</head>
<body>
    <aside class="panel">
        <h1>Celticket Layout Studio</h1>

        <div class="form">
            <div class="group-label full">Elementos</div>
            <button id="btnAddSection" class="btn-green full">Agregar Sección</button>
            <button id="btnAddPlatform" class="btn-green full" type="button">Agregar Escenario</button>

            <div class="group-label full">Escena</div>
            <button id="btnUndo" class="btn-gray" type="button" title="Ctrl+Z" disabled>Deshacer</button>
            <button id="btnRedo" class="btn-gray" type="button" title="Ctrl+Y / Ctrl+Shift+Z" disabled>Rehacer</button>
            <button id="btnAutoLayout" class="btn-gray full" type="button">Auto-organizar</button>
            <button id="btnClear" class="btn-red full" type="button">Limpiar todo</button>
        </div>

        <div class="group-label">Contenido</div>
        <div id="sectionList" class="section-list"></div>

        <div class="group-label">JSON</div>
        <div style="display:flex; gap:8px;">
            <button id="btnExportJson" class="btn-green" type="button">Exportar JSON</button>
            <button id="btnImportJson" class="btn-gray" type="button">Importar JSON</button>
            <button id="btnCopyJson" type="button">Copiar</button>
        </div>
        <textarea id="jsonOutput" class="json-box" spellcheck="false"></textarea>
        <p class="hint">Clic derecho sobre una sección o escenario para configurar o eliminar.</p>
    </aside>

    <section class="right">
        <div class="stage-wrap">
            <div class="stage-header">
                <span>Escenario visual (arrastra elementos con el mouse)</span>
                <span id="statusText">0 secciones</span>
            </div>
            <div id="stage" class="stage"></div>
        </div>
    </section>

    <div id="sectionContextPanel" class="context-panel">
        <h4 id="contextTitle">Configurar sección</h4>
        <div class="context-form">
            <label style="grid-column:1/-1">Nombre
                <input id="ctxName" type="text" maxlength="25" placeholder="Nombre sección">
            </label>
            <label>Filas
                <input id="ctxRows" type="number" min="1" max="40" value="5">
            </label>
            <label>Columnas
                <input id="ctxCols" type="number" min="1" max="40" value="10">
            </label>
            <label>Tamaño silla (px)
                <input id="ctxSeatSize" type="number" min="8" max="40" value="12">
            </label>
            <label>Separación (px)
                <input id="ctxSeatGap" type="number" min="0" max="20" value="4">
            </label>
            <label style="grid-column:1/-1">Precio base (pesos)
                <input id="ctxPrice" type="number" min="1000" step="100" value="20000">
            </label>
        </div>
        <div class="context-actions">
            <button id="btnCtxDeleteSection" class="btn-red" type="button">Eliminar</button>
            <div style="flex:1"></div>
            <button id="btnCtxCancel" class="btn-gray" type="button">Cancelar</button>
            <button id="btnCtxApply" class="btn-green" type="button">Aplicar</button>
        </div>
    </div>

    <div id="escenarioContextPanel" class="context-panel">
        <h4 id="escenarioContextTitle">Configurar escenario</h4>
        <div class="context-form">
            <label style="grid-column:1/-1">Nombre
                <input id="ctxEscName" type="text" maxlength="25" placeholder="Nombre escenario">
            </label>
            <label>Ancho (px)
                <input id="ctxEscWidth" type="number" min="80" max="900" value="220">
            </label>
            <label>Alto (px)
                <input id="ctxEscHeight" type="number" min="30" max="220" value="60">
            </label>
        </div>
        <div class="context-actions">
            <button id="btnCtxDeleteEscenario" class="btn-red" type="button">Eliminar</button>
            <div style="flex:1"></div>
            <button id="btnCtxEscCancel" class="btn-gray" type="button">Cancelar</button>
            <button id="btnCtxEscApply" class="btn-green" type="button">Aplicar</button>
        </div>
    </div>

    <script>
        function newEscenario(partial, idxHint) {
            return {
                id: partial?.id || ("t_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 6)),
                name: partial?.name || `Escenario ${idxHint || 1}`,
                enabled: partial?.enabled !== false,
                x: Number.isFinite(Number(partial?.x)) ? Number(partial.x) : (250 + (idxHint || 0) * 18),
                y: Number.isFinite(Number(partial?.y)) ? Number(partial.y) : 16,
                width: Number.isFinite(Number(partial?.width)) ? Math.max(80, Math.min(900, Number(partial.width))) : 220,
                height: Number.isFinite(Number(partial?.height)) ? Math.max(30, Math.min(220, Number(partial.height))) : 60,
                rotation: Number.isFinite(Number(partial?.rotation)) ? Number(partial.rotation) : 0
            };
        }

        const DEFAULTS = {
            basePrice: 20000,
            platformWidth: 220,
            platformHeight: 60
        };

        const model = {
            sections: [],
            escenarios: [newEscenario({}, 1)],
            selectedEscenarioId: null,
            seatStyle: {
                seatSize: 12,
                seatGap: 4
            },
            sectionContext: { sectionId: null },
            escenarioContext: { escenarioId: null }
        };
        model.selectedEscenarioId = model.escenarios[0].id;

        const historyState = {
            undoStack: [],
            redoStack: [],
            limit: 100
        };

        let dragState = null;

        function safeName(raw) {
            const compact = (raw || "").trim().replace(/\s+/g, "_");
            return compact.replace(/[^a-zA-Z0-9_-]/g, "").substring(0, 25);
        }

        function sectionPixelSize(section) {
            const seatSize = Number.isFinite(Number(section.seatSize))
                ? Number(section.seatSize)
                : model.seatStyle.seatSize;
            const seatGap = Number.isFinite(Number(section.seatGap))
                ? Number(section.seatGap)
                : model.seatStyle.seatGap;
            return {
                w: section.cols * seatSize + (section.cols - 1) * seatGap + 16,
                h: section.rows * seatSize + (section.rows - 1) * seatGap + 16 + 28
            };
        }

        function normalizeAngle(deg) {
            let value = deg % 360;
            if (value < 0) value += 360;
            return value;
        }

        function getSelectedEscenario() {
            return model.escenarios.find(t => t.id === model.selectedEscenarioId) || null;
        }

        function captureStateSnapshot() {
            return {
                sections: JSON.parse(JSON.stringify(model.sections)),
                escenarios: JSON.parse(JSON.stringify(model.escenarios)),
                selectedEscenarioId: model.selectedEscenarioId,
                seatStyle: {
                    seatSize: model.seatStyle.seatSize,
                    seatGap: model.seatStyle.seatGap
                }
            };
        }

        function updateHistoryButtons() {
            const btnUndo = document.getElementById("btnUndo");
            const btnRedo = document.getElementById("btnRedo");
            if (!btnUndo || !btnRedo) return;
            btnUndo.disabled = historyState.undoStack.length === 0;
            btnRedo.disabled = historyState.redoStack.length === 0;
        }

        function pushHistorySnapshot() {
            historyState.undoStack.push(captureStateSnapshot());
            if (historyState.undoStack.length > historyState.limit) {
                historyState.undoStack.shift();
            }
            historyState.redoStack = [];
            updateHistoryButtons();
        }

        function restoreSnapshot(snapshot) {
            if (!snapshot) return;
            model.sections = JSON.parse(JSON.stringify(snapshot.sections || []));
            model.escenarios = JSON.parse(JSON.stringify(snapshot.escenarios || []));
            model.selectedEscenarioId = snapshot.selectedEscenarioId || null;
            model.seatStyle.seatSize = Number.isFinite(Number(snapshot?.seatStyle?.seatSize))
                ? Number(snapshot.seatStyle.seatSize)
                : 12;
            model.seatStyle.seatGap = Number.isFinite(Number(snapshot?.seatStyle?.seatGap))
                ? Number(snapshot.seatStyle.seatGap)
                : 4;

            if (!Array.isArray(model.escenarios) || model.escenarios.length === 0) {
                model.escenarios = [newEscenario({}, 1)];
            }
            if (!model.escenarios.some(e => e.id === model.selectedEscenarioId)) {
                model.selectedEscenarioId = model.escenarios[0]?.id || null;
            }
            hideAllContextMenus();
            renderStage();
        }

        function undo() {
            if (historyState.undoStack.length === 0) return;
            const previous = historyState.undoStack.pop();
            historyState.redoStack.push(captureStateSnapshot());
            restoreSnapshot(previous);
            updateHistoryButtons();
        }

        function redo() {
            if (historyState.redoStack.length === 0) return;
            const next = historyState.redoStack.pop();
            historyState.undoStack.push(captureStateSnapshot());
            restoreSnapshot(next);
            updateHistoryButtons();
        }

        function clampSection(section) {
            const stage = document.getElementById("stage");
            const size = sectionPixelSize(section);
            const maxX = Math.max(0, stage.clientWidth - size.w);
            const maxY = Math.max(0, stage.clientHeight - size.h);
            section.x = Math.max(0, Math.min(section.x, maxX));
            section.y = Math.max(0, Math.min(section.y, maxY));
        }

        function clampEscenario(esc) {
            const stage = document.getElementById("stage");
            const maxX = Math.max(0, stage.clientWidth - esc.width);
            const maxY = Math.max(0, stage.clientHeight - esc.height);
            esc.x = Math.max(0, Math.min(esc.x, maxX));
            esc.y = Math.max(0, Math.min(esc.y, maxY));
        }

        function getLayoutConfig() {
            const stage = document.getElementById("stage");
            const tarimas = model.escenarios.map(t => ({
                name: t.name,
                enabled: t.enabled,
                x: t.x,
                y: t.y,
                width: t.width,
                height: t.height,
                rotation: t.rotation
            }));

            return {
                meta: {
                    source: "layout_builder_v1",
                    recommendedScaleForSeatMock: 2.85,
                    seatSize: model.seatStyle.seatSize,
                    seatGap: model.seatStyle.seatGap,
                    canvasWidth: stage ? stage.clientWidth : null,
                    canvasHeight: stage ? stage.clientHeight : null
                },
                tarimas,
                tarima: tarimas[0] || null,
                sections: model.sections.map(s => ({
                    name: s.name,
                    rows: s.rows,
                    cols: s.cols,
                    basePrice: s.basePrice,
                    seatSize: s.seatSize,
                    seatGap: s.seatGap,
                    x: s.x,
                    y: s.y
                }))
            };
        }

        function refreshJsonOutput() {
            document.getElementById("jsonOutput").value = JSON.stringify(getLayoutConfig(), null, 2);
        }

        function updateStatus() {
            const s = model.sections.length;
            const e = model.escenarios.length;
            document.getElementById("statusText").innerText =
                `${s} ${s === 1 ? "sección" : "secciones"} | ${e} ${e === 1 ? "escenario" : "escenarios"}`;
        }

        function renderSectionList() {
            const list = document.getElementById("sectionList");
            list.innerHTML = "";

            if (model.sections.length === 0 && model.escenarios.length === 0) {
                list.innerHTML = '<div class="section-item"><div class="meta">Sin elementos todavía.</div></div>';
            }

            model.sections.forEach((s) => {
                const item = document.createElement("div");
                item.className = "section-item";
                item.innerHTML = `
                    <div class="title">${s.name}</div>
                    <div class="meta">${s.rows}x${s.cols} · $${s.basePrice.toLocaleString('es-CO')}</div>
                `;
                list.appendChild(item);
            });

            model.escenarios.forEach((t) => {
                const item = document.createElement("div");
                item.className = "section-item";
                item.style.borderColor = t.id === model.selectedEscenarioId ? "#f59e0b" : "#334155";
                item.innerHTML = `
                    <div class="title">${t.name}</div>
                    <div class="meta">${Math.round(t.width)}x${Math.round(t.height)} · rot(${Math.round(t.rotation)}°)</div>
                `;
                list.appendChild(item);
            });

            refreshJsonOutput();
            updateStatus();
        }

        function renderStage() {
            const stage = document.getElementById("stage");
            stage.innerHTML = "";

            const originMarker = document.createElement("div");
            originMarker.className = "origin-cross";
            originMarker.title = "(0,0)";
            stage.appendChild(originMarker);

            model.escenarios.forEach((esc) => {
                clampEscenario(esc);
                if (!esc.enabled) return;

                const platform = document.createElement("div");
                platform.className = "platform-box" + (esc.id === model.selectedEscenarioId ? " selected" : "");
                platform.dataset.id = esc.id;
                platform.style.left = esc.x + "px";
                platform.style.top = esc.y + "px";
                platform.style.width = esc.width + "px";
                platform.style.height = esc.height + "px";
                platform.style.transform = `rotate(${esc.rotation}deg)`;
                platform.style.transformOrigin = "center center";
                platform.addEventListener("mousedown", () => {
                    model.selectedEscenarioId = esc.id;
                    renderSectionList();
                });
                platform.addEventListener("contextmenu", (e) => openEscenarioContextMenu(e, esc.id));

                const title = document.createElement("div");
                title.className = "platform-title";
                title.innerText = `${esc.name.toUpperCase()} (${Math.round(esc.rotation)}°)`;
                title.addEventListener("mousedown", (e) => startInteraction(e, "esc-move", esc.id));
                platform.appendChild(title);

                const rotateHandle = document.createElement("div");
                rotateHandle.className = "platform-rotate-handle";
                rotateHandle.title = "Rotar";
                rotateHandle.addEventListener("mousedown", (e) => startInteraction(e, "esc-rotate", esc.id));
                platform.appendChild(rotateHandle);

                const resizeHandle = document.createElement("div");
                resizeHandle.className = "platform-resize-handle";
                resizeHandle.title = "Redimensionar";
                resizeHandle.addEventListener("mousedown", (e) => startInteraction(e, "esc-resize", esc.id));
                platform.appendChild(resizeHandle);

                stage.appendChild(platform);
            });

            model.sections.forEach(section => {
                clampSection(section);

                const box = document.createElement("div");
                box.className = "section-box";
                box.dataset.id = section.id;
                box.style.left = section.x + "px";
                box.style.top = section.y + "px";

                const size = sectionPixelSize(section);
                box.style.width = size.w + "px";

                const title = document.createElement("div");
                title.className = "section-title";
                title.innerHTML = `<span>${section.name}</span><span>${section.rows}x${section.cols}</span>`;
                title.addEventListener("mousedown", (e) => startInteraction(e, "section-move", section.id));
                box.appendChild(title);
                box.addEventListener("contextmenu", (e) => openSectionContextMenu(e, section.id));

                const miniGrid = document.createElement("div");
                miniGrid.className = "mini-grid";
                const seatSize = Number.isFinite(Number(section.seatSize))
                    ? Number(section.seatSize)
                    : model.seatStyle.seatSize;
                const seatGap = Number.isFinite(Number(section.seatGap))
                    ? Number(section.seatGap)
                    : model.seatStyle.seatGap;
                miniGrid.style.gridTemplateColumns = `repeat(${section.cols}, ${seatSize}px)`;
                miniGrid.style.gap = `${seatGap}px`;
                for (let r = 0; r < section.rows; r++) {
                    const rowLabel = String.fromCharCode(65 + r);
                    for (let c = 1; c <= section.cols; c++) {
                        const seat = document.createElement("div");
                        seat.className = "mini-seat";
                        seat.style.width = `${seatSize}px`;
                        seat.style.height = `${seatSize}px`;
                        seat.style.borderRadius = `${Math.max(2, Math.round(seatSize * 0.25))}px`;
                        seat.style.fontSize = `${Math.max(7, Math.min(12, Math.round(seatSize * 0.5)))}px`;
                        seat.innerText = `${rowLabel}${c}`;
                        miniGrid.appendChild(seat);
                    }
                }
                box.appendChild(miniGrid);

                stage.appendChild(box);
            });

            renderSectionList();
        }

        function addSection() {
            pushHistorySnapshot();
            let name = `SECCION_${model.sections.length + 1}`;
            let suffix = 2;
            while (model.sections.some(s => s.name === name)) {
                name = `SECCION_${model.sections.length + 1}_${suffix}`;
                suffix++;
            }

            model.sections.push({
                id: "s_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 6),
                name,
                rows: 5,
                cols: 10,
                basePrice: DEFAULTS.basePrice,
                seatSize: model.seatStyle.seatSize,
                seatGap: model.seatStyle.seatGap,
                x: 20 + model.sections.length * 20,
                y: 40 + model.sections.length * 20
            });

            renderStage();
        }

        function removeSectionById(id) {
            const idx = model.sections.findIndex(s => s.id === id);
            if (idx >= 0) {
                pushHistorySnapshot();
                model.sections.splice(idx, 1);
                renderStage();
            }
        }

        function addEscenario() {
            pushHistorySnapshot();
            const esc = newEscenario({}, model.escenarios.length + 1);
            esc.x = 24 + model.escenarios.length * 20;
            esc.y = 16 + model.escenarios.length * 20;
            model.escenarios.push(esc);
            model.selectedEscenarioId = esc.id;
            renderStage();
        }

        function removeEscenarioById(id) {
            const idx = model.escenarios.findIndex(t => t.id === id);
            if (idx < 0) return;
            pushHistorySnapshot();
            model.escenarios.splice(idx, 1);
            model.selectedEscenarioId = model.escenarios[0]?.id || null;
            renderStage();
        }

        function clearAll() {
            pushHistorySnapshot();
            model.sections = [];
            model.escenarios = [newEscenario({}, 1)];
            model.selectedEscenarioId = model.escenarios[0].id;
            model.seatStyle.seatSize = 12;
            model.seatStyle.seatGap = 4;
            hideAllContextMenus();
            renderStage();
        }

        function autoLayout() {
            if (model.sections.length === 0) return;
            pushHistorySnapshot();
            const stage = document.getElementById("stage");
            let cursorX = 12;
            let firstY = 12;
            model.escenarios.filter(t => t.enabled).forEach(t => {
                firstY = Math.max(firstY, t.y + t.height + 14);
            });
            let cursorY = firstY;
            let lineHeight = 0;
            const gap = 12;

            model.sections.forEach(section => {
                const size = sectionPixelSize(section);
                if (cursorX + size.w > stage.clientWidth - 8) {
                    cursorX = 12;
                    cursorY += lineHeight + gap;
                    lineHeight = 0;
                }
                section.x = cursorX;
                section.y = cursorY;
                cursorX += size.w + gap;
                lineHeight = Math.max(lineHeight, size.h);
            });

            renderStage();
        }

        function exportJson() {
            refreshJsonOutput();
        }

        function copyJson() {
            const txt = document.getElementById("jsonOutput").value;
            navigator.clipboard.writeText(txt)
                .then(() => alert("JSON copiado."))
                .catch(() => {
                    const box = document.getElementById("jsonOutput");
                    box.select();
                    document.execCommand("copy");
                    alert("JSON copiado.");
                });
        }

        function importJson() {
            try {
                const txt = document.getElementById("jsonOutput").value;
                const parsed = JSON.parse(txt);
                if (!parsed.sections || !Array.isArray(parsed.sections)) {
                    throw new Error("Debe tener la propiedad sections[]");
                }

                const nextSections = parsed.sections.map((s, idx) => {
                    const name = safeName(s.name);
                    const rows = parseInt(s.rows, 10);
                    const cols = parseInt(s.cols, 10);
                    if (!name || !rows || !cols || rows < 1 || cols < 1) {
                        throw new Error("Sección inválida en índice " + idx);
                    }
                    return {
                        id: "import_s_" + idx + "_" + Date.now().toString(36),
                        name,
                        rows,
                        cols,
                        basePrice: Number.isFinite(Number(s.basePrice)) ? Math.max(1000, Math.round(Number(s.basePrice))) : 20000,
                        seatSize: Number.isFinite(Number(s.seatSize))
                            ? Math.max(8, Math.min(40, Number(s.seatSize)))
                            : (Number.isFinite(Number(parsed?.meta?.seatSize))
                                ? Math.max(8, Math.min(40, Number(parsed.meta.seatSize)))
                                : 12),
                        seatGap: Number.isFinite(Number(s.seatGap))
                            ? Math.max(0, Math.min(20, Number(s.seatGap)))
                            : (Number.isFinite(Number(parsed?.meta?.seatGap))
                                ? Math.max(0, Math.min(20, Number(parsed.meta.seatGap)))
                                : 4),
                        x: Number.isFinite(Number(s.x)) ? Number(s.x) : 20 + idx * 20,
                        y: Number.isFinite(Number(s.y)) ? Number(s.y) : 20 + idx * 20
                    };
                });

                let importedEscenarios = [];
                if (Array.isArray(parsed.tarimas)) {
                    importedEscenarios = parsed.tarimas.map((t, idx) => newEscenario(t, idx + 1));
                } else if (parsed.tarima && typeof parsed.tarima === "object") {
                    importedEscenarios = [newEscenario(parsed.tarima, 1)];
                }
                if (importedEscenarios.length === 0) {
                    importedEscenarios = [newEscenario({}, 1)];
                }

                pushHistorySnapshot();
                model.sections = nextSections;
                model.escenarios = importedEscenarios;
                model.selectedEscenarioId = model.escenarios[0].id;
                model.seatStyle.seatSize = Number.isFinite(Number(parsed?.meta?.seatSize))
                    ? Math.max(8, Math.min(40, Number(parsed.meta.seatSize)))
                    : 12;
                model.seatStyle.seatGap = Number.isFinite(Number(parsed?.meta?.seatGap))
                    ? Math.max(0, Math.min(20, Number(parsed.meta.seatGap)))
                    : 4;
                renderStage();
            } catch (e) {
                alert("JSON inválido: " + e.message);
            }
        }

        // --- Menú contextual de secciones ---

        function openSectionContextMenu(evt, sectionId) {
            evt.preventDefault();
            evt.stopPropagation();
            hideAllContextMenus();
            const section = model.sections.find(s => s.id === sectionId);
            if (!section) return;

            document.getElementById("contextTitle").innerText = `Configurar: ${section.name}`;
            document.getElementById("ctxName").value = section.name;
            document.getElementById("ctxRows").value = section.rows;
            document.getElementById("ctxCols").value = section.cols;
            document.getElementById("ctxSeatSize").value = Number.isFinite(Number(section.seatSize)) ? Number(section.seatSize) : model.seatStyle.seatSize;
            document.getElementById("ctxSeatGap").value = Number.isFinite(Number(section.seatGap)) ? Number(section.seatGap) : model.seatStyle.seatGap;
            document.getElementById("ctxPrice").value = section.basePrice;
            model.sectionContext.sectionId = section.id;

            showContextPanel("sectionContextPanel", evt.clientX, evt.clientY);
        }

        function applySectionContext() {
            const section = model.sections.find(s => s.id === model.sectionContext.sectionId);
            if (!section) { hideAllContextMenus(); return; }

            const newName = safeName(document.getElementById("ctxName").value);
            const rows = parseInt(document.getElementById("ctxRows").value, 10);
            const cols = parseInt(document.getElementById("ctxCols").value, 10);
            const seatSize = parseInt(document.getElementById("ctxSeatSize").value, 10);
            const seatGap = parseInt(document.getElementById("ctxSeatGap").value, 10);
            const price = parseInt(document.getElementById("ctxPrice").value, 10);

            if (!newName) { alert("Nombre inválido. Usa letras, números, _ o -."); return; }
            if (newName !== section.name && model.sections.some(s => s.name === newName)) { alert("Ya existe otra sección con ese nombre."); return; }
            if (!Number.isInteger(rows) || !Number.isInteger(cols) || rows < 1 || cols < 1 || rows > 40 || cols > 40) { alert("Filas y columnas deben estar entre 1 y 40."); return; }
            if (!Number.isInteger(seatSize) || seatSize < 8 || seatSize > 40) { alert("Tamaño de silla inválido (8-40)."); return; }
            if (!Number.isInteger(seatGap) || seatGap < 0 || seatGap > 20) { alert("Separación inválida (0-20)."); return; }
            if (!Number.isInteger(price) || price < 1000) { alert("Precio base inválido. Usa pesos >= 1000."); return; }

            pushHistorySnapshot();
            section.name = newName;
            section.rows = rows;
            section.cols = cols;
            section.seatSize = seatSize;
            section.seatGap = seatGap;
            section.basePrice = price;
            clampSection(section);
            hideAllContextMenus();
            renderStage();
        }

        function deleteSectionFromContext() {
            const id = model.sectionContext.sectionId;
            hideAllContextMenus();
            if (id) removeSectionById(id);
        }

        // --- Menú contextual de escenarios ---

        function openEscenarioContextMenu(evt, escId) {
            evt.preventDefault();
            evt.stopPropagation();
            hideAllContextMenus();
            const esc = model.escenarios.find(t => t.id === escId);
            if (!esc) return;

            document.getElementById("escenarioContextTitle").innerText = `Configurar: ${esc.name}`;
            document.getElementById("ctxEscName").value = esc.name;
            document.getElementById("ctxEscWidth").value = Math.round(esc.width);
            document.getElementById("ctxEscHeight").value = Math.round(esc.height);
            model.escenarioContext.escenarioId = esc.id;

            showContextPanel("escenarioContextPanel", evt.clientX, evt.clientY);
        }

        function applyEscenarioContext() {
            const esc = model.escenarios.find(t => t.id === model.escenarioContext.escenarioId);
            if (!esc) { hideAllContextMenus(); return; }

            const newName = (document.getElementById("ctxEscName").value || "").trim();
            const width = parseInt(document.getElementById("ctxEscWidth").value, 10);
            const height = parseInt(document.getElementById("ctxEscHeight").value, 10);

            if (!newName) { alert("Nombre inválido."); return; }
            if (!Number.isInteger(width) || width < 80 || width > 900) { alert("Ancho inválido (80-900)."); return; }
            if (!Number.isInteger(height) || height < 30 || height > 220) { alert("Alto inválido (30-220)."); return; }

            pushHistorySnapshot();
            esc.name = newName;
            esc.width = width;
            esc.height = height;
            clampEscenario(esc);
            hideAllContextMenus();
            renderStage();
        }

        function deleteEscenarioFromContext() {
            const id = model.escenarioContext.escenarioId;
            hideAllContextMenus();
            if (id) removeEscenarioById(id);
        }

        // --- Helpers de paneles contextuales ---

        function showContextPanel(panelId, mouseX, mouseY) {
            const panel = document.getElementById(panelId);
            panel.style.display = "block";
            const margin = 8;
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            const rect = panel.getBoundingClientRect();
            let left = mouseX;
            let top = mouseY;
            if (left + rect.width + margin > vw) left = vw - rect.width - margin;
            if (top + rect.height + margin > vh) top = vh - rect.height - margin;
            panel.style.left = Math.max(margin, left) + "px";
            panel.style.top = Math.max(margin, top) + "px";
        }

        function hideAllContextMenus() {
            document.getElementById("sectionContextPanel").style.display = "none";
            document.getElementById("escenarioContextPanel").style.display = "none";
            model.sectionContext.sectionId = null;
            model.escenarioContext.escenarioId = null;
        }

        // --- Drag & drop ---

        function startInteraction(evt, mode, targetId) {
            if (evt.button !== 0) return;
            evt.preventDefault();
            evt.stopPropagation();
            const stage = document.getElementById("stage");
            const stageRect = stage.getBoundingClientRect();

            if (mode.startsWith("esc-")) {
                model.selectedEscenarioId = targetId;
                const t = model.escenarios.find(x => x.id === targetId);
                if (!t) return;
                dragState = {
                    mode,
                    targetId,
                    stageRect,
                    startMouseX: evt.clientX,
                    startMouseY: evt.clientY,
                    startX: t.x,
                    startY: t.y,
                    startWidth: t.width,
                    startHeight: t.height,
                    startRotation: t.rotation,
                    historyPushed: false
                };
                const box = document.querySelector(`.platform-box[data-id="${targetId}"]`);
                if (box) box.classList.add("dragging");
            } else if (mode === "section-move") {
                const section = model.sections.find(s => s.id === targetId);
                if (!section) return;
                dragState = {
                    mode,
                    targetId,
                    stageRect,
                    startMouseX: evt.clientX,
                    startMouseY: evt.clientY,
                    startX: section.x,
                    startY: section.y,
                    historyPushed: false
                };
                const box = document.querySelector(`.section-box[data-id="${targetId}"]`);
                if (box) box.classList.add("dragging");
            }

            document.addEventListener("mousemove", onDrag);
            document.addEventListener("mouseup", stopDrag);
        }

        function onDrag(evt) {
            if (!dragState) return;
            if (!dragState.historyPushed) {
                pushHistorySnapshot();
                dragState.historyPushed = true;
            }
            if (dragState.mode.startsWith("esc-")) {
                const esc = model.escenarios.find(t => t.id === dragState.targetId);
                if (!esc) return;

                if (dragState.mode === "esc-move") {
                    esc.x = dragState.startX + (evt.clientX - dragState.startMouseX);
                    esc.y = dragState.startY + (evt.clientY - dragState.startMouseY);
                    clampEscenario(esc);
                } else if (dragState.mode === "esc-resize") {
                    esc.width = Math.max(80, Math.min(900, dragState.startWidth + (evt.clientX - dragState.startMouseX)));
                    esc.height = Math.max(30, Math.min(220, dragState.startHeight + (evt.clientY - dragState.startMouseY)));
                    clampEscenario(esc);
                } else if (dragState.mode === "esc-rotate") {
                    const centerX = esc.x + esc.width / 2;
                    const centerY = esc.y + esc.height / 2;
                    const dx = evt.clientX - (dragState.stageRect.left + centerX);
                    const dy = evt.clientY - (dragState.stageRect.top + centerY);
                    esc.rotation = normalizeAngle((Math.atan2(dy, dx) * 180 / Math.PI) + 90);
                }
            } else if (dragState.mode === "section-move") {
                const section = model.sections.find(s => s.id === dragState.targetId);
                if (!section) return;
                section.x = dragState.startX + (evt.clientX - dragState.startMouseX);
                section.y = dragState.startY + (evt.clientY - dragState.startMouseY);
                clampSection(section);
            }

            renderStage();
        }

        function stopDrag() {
            document.removeEventListener("mousemove", onDrag);
            document.removeEventListener("mouseup", stopDrag);
            document.querySelectorAll(".section-box.dragging, .platform-box.dragging").forEach(el => el.classList.remove("dragging"));
            dragState = null;
            renderSectionList();
        }

        // --- Event listeners ---

        document.getElementById("btnAddSection").addEventListener("click", addSection);
        document.getElementById("btnAddPlatform").addEventListener("click", addEscenario);
        document.getElementById("btnUndo").addEventListener("click", undo);
        document.getElementById("btnRedo").addEventListener("click", redo);
        document.getElementById("btnAutoLayout").addEventListener("click", autoLayout);
        document.getElementById("btnClear").addEventListener("click", clearAll);
        document.getElementById("btnExportJson").addEventListener("click", exportJson);
        document.getElementById("btnImportJson").addEventListener("click", importJson);
        document.getElementById("btnCopyJson").addEventListener("click", copyJson);

        document.getElementById("btnCtxCancel").addEventListener("click", hideAllContextMenus);
        document.getElementById("btnCtxApply").addEventListener("click", applySectionContext);
        document.getElementById("btnCtxDeleteSection").addEventListener("click", deleteSectionFromContext);

        document.getElementById("btnCtxEscCancel").addEventListener("click", hideAllContextMenus);
        document.getElementById("btnCtxEscApply").addEventListener("click", applyEscenarioContext);
        document.getElementById("btnCtxDeleteEscenario").addEventListener("click", deleteEscenarioFromContext);

        document.addEventListener("click", (evt) => {
            const secPanel = document.getElementById("sectionContextPanel");
            const escPanel = document.getElementById("escenarioContextPanel");
            if (secPanel.style.display === "block" && !secPanel.contains(evt.target)) hideAllContextMenus();
            if (escPanel.style.display === "block" && !escPanel.contains(evt.target)) hideAllContextMenus();
        });
        document.addEventListener("contextmenu", (evt) => {
            if (evt.target.closest(".section-box") || evt.target.closest(".platform-box")) return;
            hideAllContextMenus();
        });
        document.addEventListener("keydown", (evt) => {
            const target = evt.target;
            const isEditable = target && (
                target.tagName === "INPUT" ||
                target.tagName === "TEXTAREA" ||
                target.isContentEditable
            );
            if (isEditable) return;

            const key = (evt.key || "").toLowerCase();
            const hasMod = evt.ctrlKey || evt.metaKey;
            const wantsUndo = hasMod && !evt.shiftKey && key === "z";
            const wantsRedo = hasMod && ((evt.shiftKey && key === "z") || key === "y");

            if (wantsUndo) {
                evt.preventDefault();
                undo();
            } else if (wantsRedo) {
                evt.preventDefault();
                redo();
            }
        });
        window.addEventListener("resize", renderStage);

        refreshJsonOutput();
        renderStage();
        updateHistoryButtons();
    </script>
</body>
</html>
